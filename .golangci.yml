version: "2"

run:
  go: '1.26'
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true

linters:
  default: none
  enable:
    # Core checks
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - copyloopvar
    - dupl
    - errchkjson
    - exhaustive
    - fatcontext
    - forbidigo
    - goconst
    - rowserrcheck
    - gocritic
    - makezero
    - reassign
    # Style & Formatting
    - lll
    # Complexity & Maintainability
    - cyclop

  settings:
    lll:
      line-length: 120
      tab-width: 1
    govet:
      enable-all: true
      disable:
        - fieldalignment
    errcheck:
      check-blank: true
      check-type-assertions: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rkuska/carn

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
